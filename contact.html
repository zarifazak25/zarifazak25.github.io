<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CHANGE: Update with your name -->
    <title>Contact - Your Name</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ============================================ -->
    <!-- NAVIGATION BAR -->
    <!-- ============================================ -->
    <nav class="navbar">
        <div class="nav-container">
            <!-- CHANGE: Replace "Your Name" with your actual name -->
            <a href="index.html" class="nav-logo">Your Name</a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about_me.html" class="nav-link">About Me</a></li>
                <li><a href="portfolio.html" class="nav-link">Portfolio</a></li>
                <li><a href="contact.html" class="nav-link active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- ============================================ -->
    <!-- CONTACT SECTION -->
    <!-- ============================================ -->
    <section class="contact-section">
        <div class="container">
            <h2 class="section-title">Get In Touch</h2>
            <p class="section-subtitle">I'd love to hear from you</p>
            
            <div class="contact-content">
                <div class="contact-info">
                    
                    <!-- ============================================ -->
                    <!-- EMAIL -->
                    <!-- CHANGE: Replace with your actual email -->
                    <!-- ============================================ -->
                    <div class="contact-item">
                        <div class="contact-icon">📧</div>
                        <div>
                            <h3>Email</h3>
                            <!-- CHANGE: Put your email address here (in 2 places) -->
                            <a href="mailto:your.email@example.com">your.email@example.com</a>
                        </div>
                    </div>
                    
                    <!-- ============================================ -->
                    <!-- LINKEDIN -->
                    <!-- CHANGE: Replace with your LinkedIn profile -->
                    <!-- ============================================ -->
                    <div class="contact-item">
                        <div class="contact-icon">💼</div>
                        <div>
                            <h3>LinkedIn</h3>
                            <!-- CHANGE: Put your LinkedIn URL (in 2 places) -->
                            <!-- Example: https://linkedin.com/in/johnsmith -->
                            <a href="https://linkedin.com/in/yourprofile" target="_blank">linkedin.com/in/yourprofile</a>
                        </div>
                    </div>
                    
                    <!-- ============================================ -->
                    <!-- GITHUB -->
                    <!-- CHANGE: Replace with your GitHub profile -->
                    <!-- ============================================ -->
                    <div class="contact-item">
                        <div class="contact-icon">🐙</div>
                        <div>
                            <h3>GitHub</h3>
                            <!-- CHANGE: Put your GitHub URL (in 2 places) -->
                            <!-- Example: https://github.com/johnsmith -->
                            <a href="https://github.com/yourusername" target="_blank">github.com/yourusername</a>
                        </div>
                    </div>
                    
                    <!-- ============================================ -->
                    <!-- OTHER LINK (Optional) -->
                    <!-- CHANGE: Add another link or delete this section -->
                    <!-- Ideas: Twitter, personal blog, portfolio site -->
                    <!-- ============================================ -->
                    <div class="contact-item">
                        <div class="contact-icon">🌐</div>
                        <div>
                            <!-- CHANGE: Change the platform name -->
                            <h3>Other</h3>
                            <!-- CHANGE: Add your link and text -->
                            <a href="https://yourwebsite.com" target="_blank">Add another link here</a>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </section>

    <!-- ============================================ -->
    <!-- FOOTER -->
    <!-- ============================================ -->
    <footer class="footer">
        <div class="container">
            <!-- CHANGE: Replace "Your Name" and year -->
            <p>&copy; 2024 Your Name. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
